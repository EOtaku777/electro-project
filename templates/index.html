<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЭлектроПроект - Проектирование электрощитов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.9;
        }
        .equipment-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .equipment-item button {
            width: auto;
            padding: 5px 15px;
            background: #28a745;
        }
        .equipment-info {
            flex: 1;
        }
        .equipment-info small {
            color: #666;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 5px;
            font-size: 0.75em;
            margin-left: 5px;
        }
        .shield-item {
            background: #e9ecef;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .shield-item button {
            width: auto;
            background: #dc3545;
            padding: 5px 10px;
        }
        .total {
            font-size: 1.2em;
            font-weight: bold;
            color: #28a745;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 2px solid #dee2e6;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            background: #d4edda;
            border-radius: 8px;
            color: #155724;
        }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .filter-bar input, .filter-bar select {
            margin: 0;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #dee2e6;
            padding-bottom: 10px;
        }
        .tab {
            padding: 8px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .project-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .project-item:hover {
            background: #e9ecef;
        }
        .save-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            margin-top: 10px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .equipment-item {
                flex-direction: column;
                text-align: center;
            }
            .equipment-item button {
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ ЭлектроПроект ⚡</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('calculator')">📊 Калькулятор</div>
            <div class="tab" onclick="switchTab('catalog')">🛒 Каталог</div>
            <div class="tab" onclick="switchTab('shield')">📦 Мой щит</div>
            <div class="tab" onclick="switchTab('projects')">💾 Проекты</div>
        </div>
        
        <!-- Вкладка 1: Калькулятор -->
        <div id="tab-calculator" class="tab-content active">
            <div class="card">
                <h2>📊 Расчёт нагрузки</h2>
                <input type="number" id="powerInput" placeholder="Мощность (кВт)" step="0.1">
                <button onclick="calculateLoad()">Рассчитать ток</button>
                <div id="calcResult"></div>
            </div>
            
            <div class="card">
                <h2>🔧 Расчёт щита целиком</h2>
                <p>Добавьте оборудование в щит на вкладке "Каталог", затем вернитесь сюда</p>
                <button onclick="calculateShieldTotal()">Рассчитать суммарную нагрузку</button>
                <div id="shieldCalcResult"></div>
            </div>
        </div>
        
        <!-- Вкладка 2: Каталог оборудования -->
        <div id="tab-catalog" class="tab-content">
            <div class="card">
                <h2>🛒 Каталог оборудования</h2>
                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="Поиск..." onkeyup="filterEquipment()">
                    <select id="typeFilter" onchange="filterEquipment()">
                        <option value="all">Все типы</option>
                        <option value="MCB">Автоматы</option>
                        <option value="RCD">УЗО</option>
                        <option value="RCBO">Дифавтоматы</option>
                    </select>
                </div>
                <div id="equipmentList" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
        
        <!-- Вкладка 3: Мой щит + Смета -->
        <div id="tab-shield" class="tab-content">
            <div class="card">
                <h2>📦 Мой электрощит</h2>
                <div id="shieldList" style="min-height: 150px; max-height: 400px; overflow-y: auto;"></div>
                <div id="shieldTotal" class="total"></div>
                <button onclick="calculateShieldTotal()" style="background: #17a2b8;">🔧 Пересчитать нагрузку</button>
                <button onclick="saveProject()" class="save-btn">💾 Сохранить проект</button>
                <div id="shieldCalcResult2"></div>
            </div>
        </div>
        
        <!-- Вкладка 4: Сохранённые проекты -->
        <div id="tab-projects" class="tab-content">
            <div class="card">
                <h2>💾 Сохранённые проекты</h2>
                <div id="projectsList"></div>
            </div>
        </div>
    </div>

    <script>
        let equipment = [];
        let shield = JSON.parse(localStorage.getItem('shield') || '[]');
        
        // Переключение вкладок
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            if (tabName === 'projects') loadProjects();
            if (tabName === 'shield') updateShieldDisplay();
        }
        
        // Загрузка оборудования
        async function loadEquipment() {
            try {
                const response = await fetch('/api/equipment');
                equipment = await response.json();
                displayEquipment();
            } catch (error) {
                console.error('Ошибка загрузки оборудования:', error);
                document.getElementById('equipmentList').innerHTML = '<div class="loading">❌ Ошибка загрузки. Убедитесь, что сервер запущен</div>';
            }
        }
        
        function displayEquipment() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const typeFilter = document.getElementById('typeFilter')?.value || 'all';
            
            let filtered = equipment.filter(e => 
                e.name.toLowerCase().includes(searchTerm) || 
                e.vendor.toLowerCase().includes(searchTerm)
            );
            
            if (typeFilter !== 'all') {
                filtered = filtered.filter(e => e.type === typeFilter);
            }
            
            const container = document.getElementById('equipmentList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">📭 Оборудование не найдено</div>';
                return;
            }
            
            container.innerHTML = filtered.map(eq => `
                <div class="equipment-item">
                    <div class="equipment-info">
                        <strong>${eq.name}</strong><br>
                        <small>${eq.rated_current}А | ${eq.price} руб. | ${eq.vendor}</small>
                        <span class="badge">${eq.modules} модуля</span>
                    </div>
                    <button onclick="addToShield(${eq.id})">+ Добавить в щит</button>
                </div>
            `).join('');
        }
        
        function filterEquipment() { displayEquipment(); }
        
        function addToShield(id) {
            const eq = equipment.find(e => e.id === id);
            if (eq) {
                shield.push({...eq, quantity: 1, power: eq.rated_current * 0.22});
                localStorage.setItem('shield', JSON.stringify(shield));
                updateShieldDisplay();
                alert(`✅ ${eq.name} добавлен в щит`);
            }
        }
        
        function removeFromShield(index) {
            shield.splice(index, 1);
            localStorage.setItem('shield', JSON.stringify(shield));
            updateShieldDisplay();
        }
        
        function updateShieldDisplay() {
            const container = document.getElementById('shieldList');
            if (!container) return;
            
            if (shield.length === 0) {
                container.innerHTML = '<div class="loading">🛒 Щит пуст. Добавьте оборудование из каталога</div>';
                document.getElementById('shieldTotal').innerHTML = '';
                return;
            }
            
            container.innerHTML = shield.map((item, idx) => `
                <div class="shield-item">
                    <span><strong>${item.name}</strong> <small>(${item.rated_current}А, ${item.price} руб.)</small></span>
                    <button onclick="removeFromShield(${idx})">✖ Удалить</button>
                </div>
            `).join('');
            
            const total = shield.reduce((sum, item) => sum + item.price, 0);
            const modules = shield.reduce((sum, item) => sum + item.modules, 0);
            document.getElementById('shieldTotal').innerHTML = `💰 Итого: ${total} руб. | 📏 Занято модулей: ${modules}/48`;
        }
        
        async function calculateLoad() {
            const power = document.getElementById('powerInput').value;
            if (!power) return;
            
            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({power: parseFloat(power)})
                });
                const data = await response.json();
                document.getElementById('calcResult').innerHTML = `
                    <div class="result">
                        <strong>Результат расчёта:</strong><br>
                        Мощность: ${data.power} кВт<br>
                        Расчётный ток: ${data.current} А<br>
                        <strong style="color: #dc3545;">Рекомендуемый автомат: ${data.breaker} А</strong><br>
                        ${data.message}
                    </div>
                `;
            } catch (error) {
                document.getElementById('calcResult').innerHTML = `<div class="result" style="background:#f8d7da;color:#721c24;">❌ Ошибка: ${error.message}</div>`;
            }
        }
        
        async function calculateShieldTotal() {
            if (shield.length === 0) {
                alert('Добавьте оборудование в щит');
                return;
            }
            
            const devices = shield.map(d => ({power: d.power || d.rated_current * 0.22}));
            
            try {
                const response = await fetch('/api/shield/calculate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({devices})
                });
                const data = await response.json();
                
                const html = `
                    <div class="result">
                        <strong>📐 Расчёт щита:</strong><br>
                        Количество устройств: ${data.devices_count}<br>
                        Суммарная мощность: ${data.total_power} кВт<br>
                        Суммарный ток: ${data.total_current} А<br>
                        Коэффициент одновременности: ${data.koef}<br>
                        <strong style="color: #dc3545;">Вводной автомат: ${data.main_breaker} А</strong>
                    </div>
                `;
                
                if (document.getElementById('shieldCalcResult')) 
                    document.getElementById('shieldCalcResult').innerHTML = html;
                if (document.getElementById('shieldCalcResult2')) 
                    document.getElementById('shieldCalcResult2').innerHTML = html;
                    
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        async function saveProject() {
            const name = prompt('Введите название проекта:');
            if (!name) return;
            
            const total = shield.reduce((sum, item) => sum + item.price, 0);
            
            try {
                const response = await fetch('/api/save_project', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, devices: shield, total_price: total})
                });
                const data = await response.json();
                if (data.status === 'saved') {
                    alert(`✅ Проект "${name}" сохранён!`);
                    loadProjects();
                }
            } catch (error) {
                alert('Ошибка сохранения: ' + error.message);
            }
        }
        
        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');
                const projects = await response.json();
                const container = document.getElementById('projectsList');
                
                if (projects.length === 0) {
                    container.innerHTML = '<div class="loading">📭 Нет сохранённых проектов</div>';
                    return;
                }
                
                container.innerHTML = projects.map(p => `
                    <div class="project-item" onclick="loadProject(${p.id})">
                        <strong>${p.name}</strong><br>
                        <small>${p.date} | Сумма: ${p.total_price} руб.</small>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ошибка загрузки проектов:', error);
            }
        }
        
        function loadProject(id) {
            alert('Функция загрузки проекта в разработке. Проект сохранён в БД!');
        }
        
        // Инициализация
        loadEquipment();
        updateShieldDisplay();
        
        // Автосохранение каждые 30 секунд
        setInterval(() => {
            if (shield.length > 0) {
                localStorage.setItem('shield', JSON.stringify(shield));
            }
        }, 30000);
    </script>
</body>
</html>
